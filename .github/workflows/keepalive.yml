name: Supabase keep-alive

# Supabase free-tier projects pause after ~7 days without real database activity.
# Gateway-level REST reads do NOT count — proven 2026-07-07 when this project
# paused despite successful authenticated reads every 3 days. The fix is a real
# WRITE, daily, via the keepalive_ping() RPC (setup: supabase/keepalive.sql).
on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC daily
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keepalive write via RPC
        run: |
          STATUS=$(curl -sS -o /tmp/body -w "%{http_code}" -X POST \
            "https://zqirmvwhfanhnngchewn.supabase.co/rest/v1/rpc/keepalive_ping" \
            -H "apikey: sb_publishable_SvSLn43ue85UmyPseM1IUA_jCyUq8B4" \
            -H "Authorization: Bearer sb_publishable_SvSLn43ue85UmyPseM1IUA_jCyUq8B4" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Supabase responded: HTTP $STATUS — $(cat /tmp/body)"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::Keepalive write FAILED (HTTP $STATUS) — the project is likely paused. Resume it in the Supabase dashboard."
            exit 1
          fi
